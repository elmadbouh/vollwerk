<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#2d2d44"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b7355"/>
      <stop offset="100%" style="stop-color:#5c4d3d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Moon icon -->
  <circle cx="600" cy="200" r="60" fill="#e8c547" opacity="0.9"/>
  <circle cx="625" cy="185" r="50" fill="#1a1a2e"/>
  
  <!-- Stars -->
  <circle cx="300" cy="120" r="3" fill="white" opacity="0.6"/>
  <circle cx="450" cy="80" r="2" fill="white" opacity="0.4"/>
  <circle cx="750" cy="100" r="3" fill="white" opacity="0.5"/>
  <circle cx="900" cy="150" r="2" fill="white" opacity="0.3"/>
  <circle cx="350" cy="250" r="2" fill="white" opacity="0.4"/>
  <circle cx="850" cy="230" r="3" fill="white" opacity="0.5"/>
  <circle cx="200" cy="180" r="2" fill="white" opacity="0.3"/>
  <circle cx="1000" cy="100" r="2" fill="white" opacity="0.4"/>
  
  <!-- Code brackets -->
  <text x="420" y="350" font-family="monospace" font-size="40" fill="#e8c547" opacity="0.7">&lt;/&gt;</text>
  <text x="700" y="350" font-family="monospace" font-size="40" fill="#8b7355" opacity="0.7">{...}</text>
  
  <!-- Flow arrows -->
  <rect x="250" y="420" width="160" height="50" rx="10" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)"/>
  <text x="290" y="452" font-family="sans-serif" font-size="16" fill="white" font-weight="bold">🌙 /dream</text>
  
  <text x="430" y="450" font-family="sans-serif" font-size="24" fill="#e8c547">⟶</text>
  
  <rect x="470" y="420" width="200" height="50" rx="10" fill="url(#accent)"/>
  <text x="500" y="452" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">🔍 Codebase-Analyse</text>
  
  <text x="690" y="450" font-family="sans-serif" font-size="24" fill="#e8c547">⟶</text>
  
  <rect x="730" y="420" width="220" height="50" rx="10" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)"/>
  <text x="755" y="452" font-family="sans-serif" font-size="14" fill="white" font-weight="bold">📝 Memory 2.0</text>
  
  <!-- Title -->
  <text x="600" y="540" text-anchor="middle" font-family="Inter, sans-serif" font-size="28" fill="white" font-weight="800">Claude Code /dream</text>
  <text x="600" y="575" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" fill="rgba(255,255,255,0.7)">Memory 2.0 – Wie KI-Agenten im Schlaf dazulernen</text>
  
  <!-- Vollwerk badge -->
  <rect x="30" y="580" width="90" height="30" rx="8" fill="url(#accent)"/>
  <text x="50" y="600" font-family="sans-serif" font-size="12" fill="white" font-weight="800">vollwerk</text>
</svg>
